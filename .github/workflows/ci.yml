name: CI

on:
  push:
    branches:
      - main
      - 'v[0-9]*'
      - 'feature/**'
      - 'issue/**'
  pull_request:
    branches:
      - main
      - 'v[0-9]*'
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_OPTIONS: --max_old_space_size=16384
  CI: 'true'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  # Clean incrementing versions (3.1.0-alpha.N) with no -g<commit> suffix in CI too.
  PublicRelease: 'true'
  # Default culture parity with the old Windows 'Set-Culture nl-BE' (the locale is generated per job).
  LANG: nl_BE.UTF-8
  LC_ALL: nl_BE.UTF-8
  # The e2e Playwright tests default to a headed browser (Test.cs); force headless on the display-less CI.
  HEADLESS: 'true'

jobs:
  # In-memory adapter: no database, no provider.
  memory:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        target:
          - CiDotnetSystemAdaptersTestMemory
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 0      # nbgv needs full history for git-height versioning
          fetch-tags: true
      - name: Generate nl-BE locale
        run: sudo locale-gen nl_BE.UTF-8 && sudo update-locale
      - name: Setup .NET SDK (from global.json)
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: Restore .NET local tools
        run: dotnet tool restore
      - name: Compute version (nbgv)
        run: dotnet nbgv cloud
      - name: Run Nuke target ${{ matrix.target }}
        run: ./build.sh -target ${{ matrix.target }}
      - name: Upload TRX artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trx-${{ matrix.target }}
          path: artifacts/Tests/*.trx
          if-no-files-found: warn
          retention-days: 14
      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: ${{ matrix.target }}
          path: artifacts/Tests/*.trx
          reporter: dotnet-trx
          fail-on-error: false

  # PostgreSQL provider: adapter test + every provider-agnostic suite.
  npgsql:
    name: ${{ matrix.target }} (npgsql)
    runs-on: ubuntu-latest
    timeout-minutes: 240
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: allors
          POSTGRES_PASSWORD: allors
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U allors"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      # Admin connection that can create/drop databases; AdminConnectionString() redirects to 'postgres'.
      ALLORS_NPGSQL: 'Server=localhost;Port=5432;User Id=allors;Password=allors'
    strategy:
      fail-fast: false
      matrix:
        target:
          # Postgres in CI currently covers only the Npgsql adapter. The database/server/workspace/e2e
          # suites run on SqlClient (the sqlclient job below); running the full suite on Npgsql is a
          # tracked follow-up (it surfaces pre-existing npgsql-specific issues: result ordering, long
          # index-name truncation, an Equals empty-pull).
          - CiDotnetSystemAdaptersTestNpgsql
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 0
          fetch-tags: true
      - name: Generate nl-BE locale
        run: sudo locale-gen nl_BE.UTF-8 && sudo update-locale
      - name: Install native test dependencies
        # libfontconfig1: SkiaSharp/ZXing barcode generation (Base/Apps domain tests).
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1
      - name: Setup .NET SDK (from global.json)
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: Restore .NET local tools
        run: dotnet tool restore
      - name: Compute version (nbgv)
        run: dotnet nbgv cloud
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Run Nuke target ${{ matrix.target }}
        run: ./build.sh -target ${{ matrix.target }} --provider npgsql
      - name: Upload TRX artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trx-${{ matrix.target }}-npgsql
          path: artifacts/Tests/*.trx
          if-no-files-found: warn
          retention-days: 14
      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: ${{ matrix.target }} (npgsql)
          path: artifacts/Tests/*.trx
          reporter: dotnet-trx
          fail-on-error: false

  # SQL Server provider: adapter test + every provider-agnostic suite.
  sqlclient:
    name: ${{ matrix.target }} (sqlclient)
    runs-on: ubuntu-latest
    timeout-minutes: 240
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: 'Y'
          MSSQL_SA_PASSWORD: 'Allors123!'
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P 'Allors123!' -Q 'SELECT 1' -b -o /dev/null"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 30s
    env:
      ALLORS_SQLCLIENT: 'Server=localhost,1433;User Id=sa;Password=Allors123!;TrustServerCertificate=true'
    strategy:
      fail-fast: false
      matrix:
        target:
          - CiDotnetSystemAdaptersTestSqlClient
          - CiDotnetCoreDatabaseTest
          - CiDotnetCoreWorkspaceLocalTest
          - CiDotnetCoreWorkspaceRemoteJsonSystemTextTest
          - CiDotnetCoreWorkspaceRemoteJsonNewtonsoftTest
          - CiDotnetBaseDatabaseTest
          - CiDotnetAppsDatabaseTest
          - CiTypescriptWorkspaceTest
          - CiTypescriptWorkspaceAdaptersJsonTest
          - CiTypescriptE2EAngularBaseTest
          - CiTypescriptWorkspacesE2EAngularAppsIntranetTest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 0
          fetch-tags: true
      - name: Generate nl-BE locale
        run: sudo locale-gen nl_BE.UTF-8 && sudo update-locale
      - name: Install native test dependencies
        # libfontconfig1: SkiaSharp/ZXing barcode generation (Base/Apps domain tests).
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1
      - name: Setup .NET SDK (from global.json)
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - name: Restore .NET local tools
        run: dotnet tool restore
      - name: Compute version (nbgv)
        run: dotnet nbgv cloud
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Run Nuke target ${{ matrix.target }}
        run: ./build.sh -target ${{ matrix.target }} --provider sqlclient
      - name: Upload TRX artifacts
        # Diagnostic download only (the report is published from disk by the next step), so upload
        # just on failure and never let a transient artifact-service flake gate the job.
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: trx-${{ matrix.target }}-sqlclient
          path: artifacts/Tests/*.trx
          if-no-files-found: warn
          retention-days: 14
      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: ${{ matrix.target }} (sqlclient)
          path: artifacts/Tests/*.trx
          reporter: dotnet-trx
          fail-on-error: false

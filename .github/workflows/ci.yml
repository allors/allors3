name: CI

on:
  push:
    branches:
      - main
      - 'v[0-9]*'
      - 'feature/**'
      - 'issue/**'
  pull_request:
    branches:
      - main
      - 'v[0-9]*'
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: ${{ matrix.target }}
    runs-on: windows-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        # Each target declares the database provider it runs against. The provider selects the in-repo
        # config template (config/<provider>) and the admin connection used to provision the database.
        include:
          # Memory adapter needs no database.
          - target: CiDotnetSystemAdaptersTestMemory
          # SqlClient adapter self-provisions per-test-class databases from ALLORS_SQLCLIENT (LocalDB).
          - target: CiDotnetSystemAdaptersTestSqlClient
            provider: sqlclient
          # Everything else runs against the bootstrapped PostgreSQL service.
          - target: CiDotnetSystemAdaptersTestNpgsql
            provider: npgsql
          - target: CiDotnetCoreDatabaseTest
            provider: npgsql
          - target: CiDotnetCoreWorkspaceLocalTest
            provider: npgsql
          - target: CiDotnetCoreWorkspaceRemoteJsonSystemTextTest
            provider: npgsql
          - target: CiDotnetCoreWorkspaceRemoteJsonNewtonsoftTest
            provider: npgsql
          - target: CiDotnetBaseDatabaseTest
            provider: npgsql
          - target: CiDotnetAppsDatabaseTest
            provider: npgsql
          - target: CiTypescriptWorkspaceTest
            provider: npgsql
          - target: CiTypescriptWorkspaceAdaptersJsonTest
            provider: npgsql
          - target: CiTypescriptE2EAngularBaseTest
            provider: npgsql
          - target: CiTypescriptWorkspacesE2EAngularAppsIntranetTest
            provider: npgsql
          # - target: CiTypescriptWorkspacesE2EAngularAppsExtranetTest  # disabled in azure-pipelines.yml

    env:
      NODE_OPTIONS: --max_old_space_size=16384
      CI: 'true'
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      # Clean incrementing versions (3.1.0-alpha.N) with no -g<commit> suffix in CI too.
      PublicRelease: 'true'
      # Admin connections that can create/drop databases. Each target reads only the one matching its
      # provider; the unused one is harmless. allors/allors is the superuser the bootstrap step creates;
      # AdminConnectionString() redirects these to the postgres/master maintenance catalog.
      ALLORS_NPGSQL: 'Server=localhost; Port=5432; User Id=allors; Password=allors'
      ALLORS_SQLCLIENT: 'Server=(localdb)\MSSQLLocalDB; Integrated Security=true; TrustServerCertificate=true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 0      # nbgv needs full history for git-height versioning
          fetch-tags: true

      - name: Set culture nl-BE
        shell: pwsh
        run: Set-Culture -CultureInfo nl-BE

      - name: Setup .NET SDK (from global.json)
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore .NET local tools
        shell: pwsh
        run: dotnet tool restore

      - name: Compute version (nbgv)
        shell: pwsh
        run: dotnet nbgv cloud

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Start PostgreSQL service
        shell: pwsh
        run: |
          $pgService = Get-Service -Name 'postgresql*' | Select-Object -First 1
          if ($pgService) {
            Write-Host "Found PostgreSQL service: $($pgService.Name)"
            Set-Service $pgService.Name -StartupType Manual
            Start-Service $pgService.Name
            Get-Service $pgService.Name
          } else {
            Write-Error "PostgreSQL service not found"
            exit 1
          }

      - name: Bootstrap PostgreSQL role and databases
        shell: pwsh
        run: |
          $env:PGPASSWORD = 'root'
          $psql = (Get-Command psql -ErrorAction SilentlyContinue)?.Source
          if (-not $psql) {
            $pgBin = Get-ChildItem 'C:\Program Files\PostgreSQL' -Directory | Sort-Object Name -Descending | Select-Object -First 1
            $psql  = Join-Path $pgBin.FullName 'bin\psql.exe'
          }
          & $psql -U postgres -h localhost -v ON_ERROR_STOP=1 -c "DO `$`$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname='allors') THEN CREATE ROLE allors LOGIN PASSWORD 'allors' SUPERUSER; END IF; END `$`$;"
          foreach ($db in 'core','base','apps') {
            $exists = & $psql -U postgres -h localhost -tAc "SELECT 1 FROM pg_database WHERE datname='$db'"
            if ($exists -ne '1') {
              & $psql -U postgres -h localhost -v ON_ERROR_STOP=1 -c "CREATE DATABASE $db OWNER allors;"
            }
          }

      - name: Setup SQL Server LocalDB
        if: matrix.provider == 'sqlclient'
        shell: pwsh
        run: |
          choco install sqllocaldb -y --no-progress
          $env:Path = [System.Environment]::GetEnvironmentVariable('Path','Machine') + ';' + [System.Environment]::GetEnvironmentVariable('Path','User')
          sqllocaldb create MSSQLLocalDB -s
          sqllocaldb info MSSQLLocalDB

      - name: Run Nuke target ${{ matrix.target }}
        shell: pwsh
        run: ./build.ps1 -target ${{ matrix.target }}${{ matrix.provider && format(' --provider {0}', matrix.provider) || '' }}

      - name: Upload TRX artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trx-${{ matrix.target }}
          path: artifacts/Tests/*.trx
          if-no-files-found: warn
          retention-days: 14

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: ${{ matrix.target }}
          path: artifacts/Tests/*.trx
          reporter: dotnet-trx
          fail-on-error: false
